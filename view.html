<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レビュー一覧 - かもくん</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script>
        (function() {
            if (typeof requireAuth === 'function' && !requireAuth()) {
                return;
            }
        })();
    </script>
    <style>
        /* ヘッダー直貼りデザイン */
        .direct-header {
            background: #1a202c;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #4a00e0;
        }
        .logo {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-menu {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #cbd5e0;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: #9f7aea;
        }
        .btn-logout {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        /* レビューカードデザイン */
        .review-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: opacity 0.3s;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            color: #718096;
            font-size: 14px;
            margin-bottom: 10px;
            border-bottom: 1px solid #f7fafc;
            padding-bottom: 8px;
        }
        .review-body {
            font-size: 16px;
            color: #2d3748;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .action-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #edf2f7;
            padding-top: 12px;
            margin-bottom: 5px;
        }
        .action-left {
            display: flex;
            gap: 10px;
        }
        .like-btn {
            background: #fff;
            border: 1px solid #e2e8f0;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #4a5568;
            transition: all 0.2s;
        }
        .pin-btn {
            background: none;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            font-size: 18px;
            padding: 2px;
        }
        /* ★追加：削除ボタンのデザイン */
        .delete-btn {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            padding: 5px;
            transition: opacity 0.2s;
        }
        .delete-btn:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .loading-message { text-align: center; padding: 40px; color: #718096; font-size: 18px; }
    </style>
</head>
<body>
    <header class="direct-header">
        <a href="index.html" class="logo">かもくん</a>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">メニュー選択</a>
            <a href="View.html" class="nav-link active">レビュー一覧</a>
            <a href="report.html" class="nav-link">レビュー投稿</a>
            <a href="pin.html" class="nav-link">📌 ピン止め済み</a>
            <button class="btn-logout" onclick="logout()">ログアウト</button>
        </nav>
    </header>

    <div class="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h2>みんなのレビュー一覧</h2>
        <div id="reviews-container">
            <div class="loading-message">読み込み中...</div>
        </div>
    </div>

    <iframe src="Database.html" id="db-iframe" style="display:none;"></iframe>
    <iframe src="Review.html" id="review-iframe" style="display:none;"></iframe>

    <script>
        function logout() { window.location.replace('logout.html'); }
        
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function getStars(rating) {
            const num = parseInt(rating) || 3;
            return '★'.repeat(num) + '☆'.repeat(5 - num);
        }

        function waitForIframeLoad(iframeId, targetObjectName) {
            return new Promise(resolve => {
                const checkInterval = setInterval(() => {
                    const iframe = document.getElementById(iframeId);
                    if (iframe && iframe.contentWindow && iframe.contentWindow[targetObjectName]) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 50);
            });
        }

        // ★追加：削除処理の関数
        window.deletePost = async function(studentId, createdAt, reviewId) {
            if (!confirm("本当にこの投稿を削除しますか？\n（この操作は元に戻せません）")) return;

            const btn = document.querySelector(`#review-${reviewId} .delete-btn`);
            if(btn) {
                btn.innerText = "削除中...";
                btn.disabled = true;
            }

            try {
                // iframeからAPIを取得して実行
                const dbFrame = document.getElementById('db-iframe').contentWindow;
                const reviewFrame = document.getElementById('review-iframe').contentWindow;
                const db = new dbFrame.Database();
                const reviewAPI = new reviewFrame.Review(db);

                const result = await reviewAPI.delete(studentId, createdAt);

                if (result.success) {
                    // 画面から該当のレビューをふんわり消す
                    const card = document.getElementById(`review-${reviewId}`);
                    card.style.opacity = '0';
                    setTimeout(() => card.remove(), 300);
                } else {
                    throw new Error(result.error);
                }
            } catch(error) {
                alert("削除に失敗しました: " + error.message);
                if(btn) {
                    btn.innerText = "🗑️ 削除";
                    btn.disabled = false;
                }
            }
        };

        document.addEventListener('DOMContentLoaded', async function() {
            const container = document.getElementById('reviews-container');
            
            // 現在ログイン中のユーザー情報を取得
            const currentUser = (typeof getStoredUser === 'function') ? getStoredUser() : null;
            const currentStudentId = currentUser ? currentUser.studentId : '';

            try {
                await Promise.all([
                    waitForIframeLoad('db-iframe', 'Database'),
                    waitForIframeLoad('review-iframe', 'Review')
                ]);

                const dbFrame = document.getElementById('db-iframe').contentWindow;
                const reviewFrame = document.getElementById('review-iframe').contentWindow;
                const db = new dbFrame.Database();
                const reviewAPI = new reviewFrame.Review(db);

                const result = await reviewAPI.getAll();
                if (result.success === false) throw new Error(result.error || "GASエラー");

                let reviewsData = result.data || result || [];
                if (reviewsData.length === 0) {
                    container.innerHTML = '<div class="loading-message">投稿されたレビューはまだありません。</div>';
                    return;
                }

                container.innerHTML = '';

                reviewsData.forEach((review, index) => {
                    const author = review.studentId || '不明';
                    const reviewId = review.id || `gen-${index}`;
                    const subject = review.subject || '未設定';
                    const rating = review.rating || 3;
                    const comment = review.comment || '';
                    const date = review.createdAt || '';

                    // ★追加：自分の投稿かどうかを判定して削除ボタンを作る
                    const isMyPost = (currentStudentId === author);
                    const deleteBtnHTML = isMyPost 
                        ? `<button class="delete-btn" onclick="deletePost('${author}', '${date}', '${reviewId}')">🗑️ 削除</button>` 
                        : '';

                    const cardHTML = `
                        <div class="review-card" id="review-${reviewId}">
                            <div class="review-header">
                                <span>投稿者: ${escapeHTML(author)}</span>
                                <span>${escapeHTML(date)}</span>
                            </div>
                            <div class="review-body">
                                <strong>${escapeHTML(subject)}</strong><br>
                                <span style="color: #d69e2e; font-size: 14px;">おすすめ度: ${getStars(rating)}</span><br><br>
                                ${escapeHTML(comment).replace(/\n/g, '<br>')}
                            </div>
                            <div class="action-area">
                                <div class="action-left">
                                    <button class="like-btn" onclick="alert('いいね機能は準備中です')">👍 0</button>
                                    <button class="pin-btn" onclick="alert('ピン留め機能は準備中です')">☆</button>
                                </div>
                                ${deleteBtnHTML}
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHTML);
                });

            } catch (error) {
                console.error("エラー:", error);
                container.innerHTML = `<div class="loading-message" style="color: #e53e3e;">レビューの取得に失敗しました。<br>詳細: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
