<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>レビューを見る - かもくん</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <iframe src="header.html" style="width:100%; border:none; height:60px; display:block;"></iframe>

    <div class="container">
        <h2>講義レビュー一覧</h2>
        
        <!-- 洗練された並び替えボックス -->
        <div class="sort-box">
            <label for="sortOrder">並び替え</label>
            <select id="sortOrder" onchange="renderReviews()">
                <option value="frequency">重複が多い順 (デフォルト)</option>
                <option value="rating">おすすめ度順</option>
                <option value="newest">新しい順</option>
            </select>
        </div>

        <div id="reviews-list" style="color: #718096; text-align: center; padding: 20px;">データを読み込み中...</div>
    </div>

    <iframe src="Repository.html" id="repo-iframe" style="display:none;"></iframe>

    <script>
    let allReviews = [];

    window.onload = function() {
        const checkReady = setInterval(() => {
            const repoFrame = document.getElementById('repo-iframe').contentWindow;
            if (repoFrame && repoFrame.reviewRepo) {
                clearInterval(checkReady);
                loadReviews(repoFrame.reviewRepo);
            }
        }, 100);
    };

    async function loadReviews(reviewRepo) {
        const res = await reviewRepo.getAll();
        if (res.success) {
            allReviews = res.data;
            renderReviews();
        } else {
            document.getElementById('reviews-list').innerText = "データの取得に失敗しました: " + res.error;
        }
    }

    function renderReviews() {
        const listDiv = document.getElementById('reviews-list');
        const sortBy = document.getElementById('sortOrder').value;
        let data = [...allReviews];

        if (data.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center; padding:30px; color:#a0aec0;">まだレビューがありません。最初のレビューを投稿してみましょう！</div>';
            return;
        }

        if (sortBy === 'newest') {
            data.sort((a, b) => b.timestamp - a.timestamp);
        } else if (sortBy === 'rating') {
            data.sort((a, b) => b.rating - a.rating);
        } else {
            const counts = {};
            data.forEach(item => counts[item.subject] = (counts[item.subject] || 0) + 1);
            data.sort((a, b) => counts[b.subject] - counts[a.subject]);
        }

        listDiv.innerHTML = "";
        data.forEach(item => {
            const stars = "★".repeat(item.rating) + "☆".repeat(5 - item.rating);
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <span class="subject-name">${item.subject}</span>
                        <span class="percentage-badge">レポート等: ${item.percentage}%</span>
                    </div>
                    <div class="rating">${stars}</div>
                </div>
                <div class="comment">${item.comment}</div>
                <div class="card-footer">投稿者ID: ${item.studentId}</div>
            `;
            listDiv.appendChild(card);
        });
    }
    </script>
</body>
</html>
