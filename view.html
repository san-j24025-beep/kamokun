<!-- view.html の <h2> のすぐ下に以下を追加 -->
<div style="margin-bottom: 20px;">
    <label>並び替え: </label>
    <select id="sortOrder" onchange="renderReviews()">
        <option value="frequency">重複が多い順 (デフォルト)</option>
        <option value="rating">おすすめ度順</option>
        <option value="newest">新しい順</option>
    </select>
</div>

<!-- JavaScript の onAppReady を書き換え -->
<script>
let allReviews = [];

async function onAppReady() {
    const res = await window.reviewRepo.getAll();
    if (res.success) {
        allReviews = res.data;
        renderReviews();
    }
}

function renderReviews() {
    const listDiv = document.getElementById('reviews-list');
    const sortBy = document.getElementById('sortOrder').value;
    let data = [...allReviews];

    // 並び替えロジック
    if (sortBy === 'newest') {
        data.sort((a, b) => b.timestamp - a.timestamp);
    } else if (sortBy === 'rating') {
        data.sort((a, b) => b.rating - a.rating);
    } else {
        // 重複が多い順
        const counts = {};
        data.forEach(item => counts[item.subject] = (counts[item.subject] || 0) + 1);
        data.sort((a, b) => counts[b.subject] - counts[a.subject]);
    }

    listDiv.innerHTML = "";
    data.forEach(item => {
        const stars = "★".repeat(item.rating) + "☆".repeat(5 - item.rating);
        const card = document.createElement('div');
        card.className = "card";
        card.innerHTML = `
            <div class="card-header">
                <div>科目: ${item.subject} (${item.percentage}%)</div>
                <div class="rating">${stars}</div>
            </div>
            <div class="comment">${item.comment}</div>
            <div style="font-size:12px; color:#7f8c8d; text-align:right; margin-top:10px;">投稿者: ${item.studentId}</div>
        `;
        listDiv.appendChild(card);
    });
}
</script>
