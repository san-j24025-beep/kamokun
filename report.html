<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>講義レビューの投稿 - かもくん</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script>
        (function() {
            if (!requireAuth()) {
                return;
            }
        })();
    </script>
    <style>
        /* ヘッダー直貼りデザイン */
        .direct-header {
            background: #1a202c;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #4a00e0;
        }
        .logo {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-menu {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #cbd5e0;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: #9f7aea;
        }
        .btn-logout {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        /* 投稿フォーム専用スタイル */
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2d3748;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #f8fafc;
        }
        .btn-submit {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ⚡ 各ページ直貼りヘッダー -->
    <header class="direct-header">
        <a href="index.html" class="logo">かもくん</a>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">メニュー選択</a>
            <a href="view.html" class="nav-link">レビュー一覧</a>
            <a href="report.html" class="nav-link active">レビュー投稿</a>
            <button class="btn-logout" onclick="logout()">ログアウト</button>
        </nav>
    </header>

    <div class="form-container">
        <h2 style="text-align: center; margin-bottom: 25px; color: #1a202c;">講義レビューの投稿</h2>
        <form id="review-form" onsubmit="submitReview(event)">
            <!-- 分野 -->
            <div class="form-group">
                <label for="category">分野・系列</label>
                <input type="text" id="category" class="form-control" placeholder="例: 情報科学">
            </div>
            <!-- 科目名 -->
            <div class="form-group">
                <label for="subject">科目名</label>
                <input type="text" id="subject" class="form-control" placeholder="科目名を入力してください" required>
            </div>
            <!-- おすすめ度 -->
            <div class="form-group">
                <label for="rating">おすすめ度</label>
                <select id="rating" class="form-control">
                    <option value="5">★★★★★ (非常におすすめ)</option>
                    <option value="4">★★★★☆ (おすすめ)</option>
                    <option value="3">★★★☆☆ (普通)</option>
                    <option value="2">★★☆☆☆ (あまりおすすめしない)</option>
                    <option value="1">★☆☆☆☆ (おすすめしない)</option>
                </select>
            </div>
            <!-- 感想 -->
            <div class="form-group">
                <label for="comment">感想・アドバイス</label>
                <textarea id="comment" class="form-control" style="min-height: 120px;" placeholder="テストの傾向や、出席の重要さなどを自由に書いてください" required></textarea>
            </div>
            <!-- 匿名チェック -->
            <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="anonymous" style="width: 20px; height: 20px; cursor: pointer;">
                <label for="anonymous" style="margin: 0; cursor: pointer;">匿名で投稿する</label>
            </div>
            <button type="submit" class="btn-submit">レビューを投稿する</button>
        </form>
    </div>

    <script>
        function logout() {
            window.location.replace('logout.html');
        }

        function submitReview(event) {
            event.preventDefault();
            const isAnonymous = document.getElementById('anonymous').checked;
            // 匿名フラグを保存
            const currentUser = getStoredUser() || { studentId: 'ゲスト' };
            saveCurrentUser(currentUser, isAnonymous);
            alert("投稿が完了しました！（一覧へ遷移します）");
            window.location.href = 'view.html';
        }
    </script>
</body>
</html>
