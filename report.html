<!-- report.html の <button> タグの前に以下を追加 -->
<div class="form-group">
    <label for="percentage">小テスト・レポートの割合 (%)</label>
    <input type="number" id="percentage" placeholder="例: 30" min="0" max="100">
</div>

<!-- JavaScriptのsubmitReviewを以下のように修正 -->
<script>
async function submitReview() {
    const subject = document.getElementById('subject').value.trim();
    const rating = document.getElementById('rating').value;
    const comment = document.getElementById('comment').value.trim();
    const percentage = document.getElementById('percentage').value.trim(); // 追加
    
    if (!subject || !comment) {
        alert("科目名と感想は必須です。");
        return;
    }

    const currentUser = window.userRepo.getCurrentUser();
    // データを送信
    const res = await window.reviewRepo.create(currentUser.studentId, subject, rating, comment, percentage);
    
    if (res.success) {
        alert("投稿が完了しました！");
        location.href = 'view.html';
    } else {
        alert("エラー: " + res.error);
    }
}
</script>
