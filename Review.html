<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
class Review {
    constructor(db) {
        this.db = db;
    }

    async getAll() {
        return await this.db.request('getReviews');
    }

    async create(studentId, subject, rating, comment) {
        return await this.db.request('createReview', { studentId, subject, rating, comment });
    }
}
window.Review = Review;
</script>
</body>
</html>
