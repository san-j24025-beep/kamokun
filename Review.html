<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
class Review {
    constructor(db) {
        this.db = db;
    }

    async create(studentId, subject, rating, comment) {
        return await this.db.request('createReview', { studentId, subject, rating, comment });
    }

    async getAll() {
        return await this.db.request('getAllReviews', {});
    }

    // ★追加: 削除用のAPI呼び出し
    async delete(studentId, createdAt) {
        return await this.db.request('deleteReview', { studentId, createdAt });
    }
}
window.Review = Review;
</script>
</body>
</html>
