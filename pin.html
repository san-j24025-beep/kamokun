<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ピン止め済みレビュー - かもくん</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script>
        (function() {
            if (!requireAuth()) {
                return;
            }
        })();
    </script>
    <style>
        /* ヘッダー直貼りデザイン */
        .direct-header {
            background: #1a202c;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #4a00e0;
        }
        .logo {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-menu {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-link {
            color: #cbd5e0;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: #9f7aea;
        }
        .btn-logout {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        /* レビューカードデザイン */
        .review-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            border-left: 4px solid #d69e2e;
        }
        .review-card.pinned {
            border-left-color: #c05621;
            background: #fffaf0;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            color: #718096;
            font-size: 14px;
            margin-bottom: 10px;
            border-bottom: 1px solid #f7fafc;
            padding-bottom: 8px;
        }
        .review-body {
            font-size: 16px;
            color: #2d3748;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .action-area {
            display: flex;
            gap: 15px;
            border-top: 1px solid #edf2f7;
            padding-top: 12px;
            margin-bottom: 15px;
        }
        .like-btn {
            background: #fff;
            color: #e53e3e;
            border: 1px solid #fed7d7;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .like-btn.liked {
            background: #fff5f5;
            opacity: 1;
            cursor: pointer;
        }
        .like-btn:hover {
            background: #fff5f5;
            transform: scale(1.05);
        }
        .pin-btn {
            background: #edf2f7;
            color: #d69e2e;
            border: 1px solid #fbd38d;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .pin-btn:hover {
            background: #fef5e7;
            transform: scale(1.05);
        }
        .pin-btn.pinned {
            background: #fef5e7;
            color: #c05621;
        }
        .reply-form {
            display: flex;
            gap: 8px;
            margin: 8px 0 0 20px;
        }
        .reply-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 12px;
        }
        .reply-submit {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .reply-item {
            margin-left: 20px;
            font-size: 13px;
            padding: 4px 0;
            color: #4a5568;
        }
        .comment-section {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
        }
        .comment-list {
            list-style: none;
            padding: 0;
            margin: 0 0 10px 0;
        }
        .comment-item {
            font-size: 14px;
            color: #4a5568;
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-user {
            font-weight: bold;
            color: #4a00e0;
            margin-right: 6px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .comment-user:hover {
            color: #6b1ee0;
        }
        .comment-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
        }
        .comment-submit {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #718096;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- ⚡ 各ページ直貼りヘッダー -->
    <header class="direct-header">
        <a href="index.html" class="logo">かもくん</a>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">メニュー選択</a>
            <a href="view.html" class="nav-link">レビュー一覧</a>
            <a href="report.html" class="nav-link">レビュー投稿</a>
            <a href="pin.html" class="nav-link active">📌 ピン止め済み</a>
            <button class="btn-logout" onclick="logout()">ログアウト</button>
        </nav>
    </header>

    <div class="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h2>📌 ピン止め済みレビュー</h2>
        
        <div id="pinned-container">
            <div class="empty-message">
                ピン止めされたレビューはまだありません
            </div>
        </div>
    </div>

    <script>
        const currentUser = getStoredUser() || { studentId: 'ゲスト', isAnonymous: false };
        const likedReviews = new Set();

        function logout() {
            window.location.replace('logout.html');
        }

        // botの名前かどうかを判定
        function isBot(studentId) {
            const botKeywords = ['bot', 'bot', 'システム', 'admin', 'test_bot'];
            return botKeywords.some(keyword => studentId.toLowerCase().includes(keyword.toLowerCase()));
        }

        // いいねボタンをトグル
        function toggleLike(button, reviewId) {
            const countSpan = button.querySelector('.like-count');
            let currentLikes = parseInt(countSpan.innerText);
            
            if (likedReviews.has(reviewId)) {
                currentLikes -= 1;
                likedReviews.delete(reviewId);
                button.classList.remove('liked');
            } else {
                currentLikes += 1;
                likedReviews.add(reviewId);
                button.classList.add('liked');
            }
            
            countSpan.innerText = currentLikes;
            button.style.transform = 'scale(1.2)';
            setTimeout(() => button.style.transform = 'scale(1)', 150);
        }

        // ピン止め解除
        function unpinReview(button, reviewId) {
            localStorage.removeItem(`pinned-${reviewId}`);
            button.closest('.review-card').remove();
            
            // ピン止めされたレビューがない場合
            const container = document.getElementById('pinned-container');
            if (container.querySelectorAll('.review-card').length === 0) {
                container.innerHTML = '<div class="empty-message">ピン止めされたレビューはまだありません</div>';
            }
        }

        // コメント投稿
        function postComment(reviewId) {
            const input = document.getElementById(`input-${reviewId}`);
            const commentText = input.value.trim();
            if (!commentText) return;

            if (isBot(currentUser.studentId)) {
                alert('botユーザーはコメントを投稿できません');
                return;
            }

            const commentList = document.getElementById(`comments-${reviewId}`);
            const li = document.createElement('li');
            li.className = 'comment-item';
            
            const userName = currentUser.isAnonymous ? '匿名' : currentUser.studentId;
            li.innerHTML = `<span class="comment-user" onclick="startReplyToComment(event)">${escapeHTML(userName)}:</span> ${escapeHTML(commentText)}`;
            li.setAttribute('data-author', currentUser.studentId);
            
            commentList.appendChild(li);
            input.value = '';
        }

        // 投稿者名をクリックで返信フォーム表示
        function startReplyToComment(event) {
            event.preventDefault();
            const commentItem = event.target.closest('.comment-item');
            let replyForm = commentItem.querySelector('.reply-form');
            
            if (replyForm) {
                replyForm.remove();
            } else {
                const commentId = Math.random().toString(36).substr(2, 9);
                const authorName = event.target.textContent.replace(':', '');
                const html = `
                    <div class="reply-form">
                        <input type="text" class="reply-input" placeholder="返信を入力..." id="reply-${commentId}">
                        <button class="reply-submit" onclick="postReply(event, '${commentId}', '${escapeHTML(authorName)}')" >送信</button>
                    </div>
                `;
                commentItem.insertAdjacentHTML('afterend', html);
                document.getElementById(`reply-${commentId}`).focus();
            }
        }

        // 返信投稿
        function postReply(event, commentId, authorName) {
            event.preventDefault();
            const replyInput = document.getElementById(`reply-${commentId}`);
            const replyText = replyInput.value.trim();
            if (!replyText) return;

            if (isBot(currentUser.studentId)) {
                alert('botユーザーは返信を投稿できません');
                return;
            }

            const replyForm = replyInput.closest('.reply-form');
            const replyDiv = document.createElement('div');
            replyDiv.className = 'reply-item';
            
            const userName = currentUser.isAnonymous ? '匿名' : currentUser.studentId;
            replyDiv.innerHTML = `<span class="comment-user">${escapeHTML(userName)}:</span> @${authorName} ${escapeHTML(replyText)}`;
            
            replyForm.insertAdjacentElement('afterend', replyDiv);
            replyForm.remove();
        }

        // HTMLエスケープ
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // ピン止めされたレビューを表示
        function displayPinnedReviews() {
            const container = document.getElementById('pinned-container');
            const pinnedReviews = [];

            // localStorageからピン止めされたレビューを取得
            for (let key in localStorage) {
                if (key.startsWith('pinned-')) {
                    pinnedReviews.push(key);
                }
            }

            if (pinnedReviews.length === 0) {
                container.innerHTML = '<div class="empty-message">ピン止めされたレビューはまだありません</div>';
                return;
            }

            container.innerHTML = '';

            // ダミーレビューをピン止め用に修正
            const dummyReview = `
                <div class="review-card pinned" id="review-1">
                    <div class="review-header">
                        <span>投稿者: t23xxx</span>
                        <span>2026/07/14</span>
                    </div>
                    <div class="review-body">
                        Webプログラミング演習の課題、難しかったけど楽しかったです！
                    </div>
                    <div class="action-area">
                        <button class="like-btn" onclick="toggleLike(this, 1)">❤️ いいね！ <span class="like-count">3</span></button>
                        <button class="pin-btn pinned" onclick="unpinReview(this, 1)">📍 ピン止め中</button>
                    </div>
                    <div class="comment-section">
                        <ul class="comment-list" id="comments-1">
                            <li class="comment-item" data-author="t23abc"><span class="comment-user" onclick="startReplyToComment(event)">t23abc:</span> それな！めちゃめちゃ苦戦しました。</li>
                        </ul>
                        <div class="comment-form">
                            <input type="text" class="comment-input" placeholder="コメントを入力..." id="input-1">
                            <button class="comment-submit" onclick="postComment(1)">送信</button>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = dummyReview;
        }

        // 初期化処理
        document.addEventListener('DOMContentLoaded', function() {
            displayPinnedReviews();
        });
    </script>
</body>
</html>
