<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ヘッダー全体の紫・ダークネイビー基調のモダンデザイン */
        .nav-header {
            background: #1a202c;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #4a00e0;
        }
        .logo {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        /* 💡 target="_top" で画面全体を確実に遷移させるリンク */
        .nav-link {
            color: #cbd5e0;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: #9f7aea;
        }
        .btn-logout {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="logo" target="_top">かもくん</a>
        
        <div class="nav-menu">
            <!-- ⚡ すべてに target="_top" を付与し、iframe内での入れ子を絶対阻止 -->
            <a href="index.html" class="nav-link" target="_top">トップページ</a>
            <a href="view.html" class="nav-link" target="_top">レビュー一覧</a>
            <a href="report.html" class="nav-link" target="_top">レビュー投稿</a>
            <button class="btn-logout" onclick="triggerLogout()">ログアウト</button>
        </div>
    </div>

    <script>
        function triggerLogout() {
            // ⚡ JavaScriptでの遷移も親画面（最上階）を強制的に書き換える
            window.top.location.href = 'logout.html';
        }
    </script>
</body>
</html>
