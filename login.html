<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - かもくん</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c3e50, #4a00e0);
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fde8e8;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2d3748;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            background-color: #f8fafc;
            font-size: 15px;
            box-sizing: border-box;
        }
        #login-btn {
            background: #4a00e0;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: background 0.2s;
        }
        #login-btn:hover {
            background: #3b00b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-bottom: 20px; color: #1a202c;">かもくん ログイン</h2>
        <div id="error-msg" class="error-message"></div>

        <div class="form-group">
            <label for="studentId">学籍番号</label>
            <input type="text" id="studentId" class="form-control" placeholder="例: t23xxx" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button id="login-btn" onclick="login()">ログイン</button>
        
        <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            <a href="register.html" style="color: #4a00e0; font-weight: 600; text-decoration: none;">新規アカウント登録はこちら</a>
        </div>
    </div>

    <!-- 必要なスクリプトの読み込み -->
    <iframe src="Database.html" id="db-iframe" style="display:none;"></iframe>
    <iframe src="User.html" id="user-iframe" style="display:none;"></iframe>
    <script src="auth.js"></script>
    <script>
    async function login() {
        const studentId = document.getElementById('studentId').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');

        errorMsg.style.display = "none";

        if (!studentId || !password) {
            errorMsg.innerText = "学籍番号とパスワードを入力してください。";
            errorMsg.style.display = "block";
            return;
        }

        const loginBtn = document.getElementById('login-btn');
        loginBtn.disabled = true;
        loginBtn.innerText = "ログイン中...";

        try {
            // Database と User の定義を取得
            const dbFrame = document.getElementById('db-iframe').contentWindow;
            const userFrame = document.getElementById('user-iframe').contentWindow;

            if (!dbFrame.Database || !userFrame.User) {
                throw new Error("システムの初期化に失敗しました。");
            }

            const db = new dbFrame.Database();
            const user = new userFrame.User(db);

            // GAS連携ログイン処理の実行
            const result = await user.login(studentId, password);

            if (result.success) {
                console.log("ログイン成功。index.htmlへ遷移します...");
                window.location.replace('index.html');
            } else {
                errorMsg.innerText = result.error || "ログインに失敗しました。";
                errorMsg.style.display = "block";
                loginBtn.disabled = false;
                loginBtn.innerText = "ログイン";
            }
        } catch (e) {
            console.error("エラーが発生しました:", e);
            errorMsg.innerText = "通信エラーまたは初期化エラーが発生しました。";
            errorMsg.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.innerText = "ログイン";
        }
    }
    </script>
</body>
</html>
