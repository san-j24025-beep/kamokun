<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ログイン - かもくん</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ログイン画面特有の中央寄せレイアウト調整 */
        html, body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c3e50, #4a00e0);
            margin: 0;
            padding: 0;
        }
        .container {
            margin: 0; /* 中央固定のためマージンをリセット */
            width: 100%;
            max-width: 400px; /* ログインボックスは少しスマートに */
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>かもくん ログイン</h2>
        
        <!-- エラー表示エリア -->
        <div id="error-msg" class="error-message"></div>

        <div class="form-group">
            <label for="studentId">学籍番号</label>
            <input type="text" id="studentId" placeholder="例: t23xxx" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e0; border-radius: 8px; background-color: #f8fafc; font-size: 15px; box-sizing: border-box;" autocomplete="current-password">
        </div>

        <button id="login-btn" onclick="login()">ログイン</button>
        
        <div style="text-align: center; margin-top: 20px; font-size: 14px;">
            <a href="register.html" style="color: #4a00e0; text-transform: none; font-weight: 600;">新規アカウント登録はこちら</a>
        </div>
    </div>

    <!-- 隠しフレーム（データ通信用） -->
    <iframe src="Repository.html" id="repo-iframe" style="display:none;"></iframe>

    <script>
    async function login() {
        const studentId = document.getElementById('studentId').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = document.getElementById('login-btn');

        // バリデーションチェック
        if (!studentId || !password) {
            errorMsg.innerText = "学籍番号とパスワードを入力してください。";
            errorMsg.style.display = "block";
            return;
        }

        // iframeリポジトリの準備確認
        const repoFrame = document.getElementById('repo-iframe').contentWindow;
        if (!repoFrame || !repoFrame.userRepo) {
            errorMsg.innerText = "システムの初期化中です。少々お待ちください。";
            errorMsg.style.display = "block";
            return;
        }

        // ボタンの連打・無効化処理
        loginBtn.disabled = true;
        loginBtn.innerText = "認証中...";
        errorMsg.style.display = "none";

        // ログイン処理を実行
        const res = await repoFrame.userRepo.login(studentId, password);

        if (res.success) {
            loginBtn.innerText = "ログイン成功！";
            loginBtn.style.backgroundColor = "#27ae60";
            
            // 💡 【重要】セッションの保存完了を待つために0.5秒のタメを作る
            setTimeout(() => {
                location.href = 'report.html';
            }, 500);
        } else {
            // 失敗時のリセット
            errorMsg.innerText = "ログインに失敗しました: " + res.error;
            errorMsg.style.display = "block";
            loginBtn.disabled = false;
            loginBtn.innerText = "ログイン";
            loginBtn.style.backgroundColor = "#2c3e50";
        }
    }

    // Enterキーでもログインできるようにする
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            login();
        }
    });
    </script>
</body>
</html>
