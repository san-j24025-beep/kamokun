<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - かもくん</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f5f6fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { width: 100%; max-width: 400px; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 24px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #2980b9; }
        .error { color: #e74c3c; margin-top: 10px; text-align: center; font-size: 14px; }
    </style>
    <script>
    // ログイン用の軽量版インポート
    async function initApp() {
        const components = ['Database.html', 'User.html'];
        for (const comp of components) {
            const res = await fetch(comp);
            const text = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const script = doc.querySelector('script');
            if (script) {
                const newScript = document.createElement('script');
                newScript.textContent = script.textContent;
                document.head.appendChild(newScript);
            }
        }
        window.db = new window.Database();
        window.userRepo = new window.User(window.db);
    }
    document.addEventListener('DOMContentLoaded', initApp);
    </script>
</head>
<body>
    <div class="login-box">
        <h2>かもくん ログイン</h2>
        <div class="form-group">
            <label for="studentId">学籍番号</label>
            <input type="text" id="studentId" placeholder="例: J24025">
        </div>
        <div class="form-group">
            <label for="grade">学年</label>
            <select id="grade">
                <option value="1">1年</option>
                <option value="2">2年</option>
                <option value="3">3年</option>
                <option value="4">4年</option>
            </select>
        </div>
        <button class="btn" onclick="handleLogin()">ログイン</button>
        <div id="error-msg" class="error"></div>
    </div>

    <script>
    async function handleLogin() {
        const studentId = document.getElementById('studentId').value.trim();
        const grade = document.getElementById('grade').value;
        const errorMsg = document.getElementById('error-msg');
        errorMsg.innerText = "";

        if (!studentId) {
            errorMsg.innerText = "学籍番号を入力してください。";
            return;
        }

        const res = await window.userRepo.login(studentId, grade);
        if (res.success) {
            location.href = 'index.html';
        } else {
            errorMsg.innerText = res.error;
        }
    }
    </script>
</body>
</html>
