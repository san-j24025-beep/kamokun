<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホーム - かもくん</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // ⚡【バグガード】もしこのページが iframe の中で開かれていたら、強制的に画面全体に引き上げる
        if (window.top !== window.self) {
            window.top.location.replace(window.self.location.href);
        }

        // ログイン状態の確認
        (function() {
            const currentUser = sessionStorage.getItem('currentUser');
            if (!currentUser) {
                window.top.location.replace('login.html');
            }
        })();
    </script>
</head>
<body>

    <!-- 共通ヘッダーの埋め込み（もしiframeで呼ぶ構成の場合も、これでリンクが安全化されます） -->
    <iframe src="header.html" style="width: 100%; border: none; height: 70px; scrollbar-width: none;" id="header-frame"></iframe>

    <div class="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h1 style="color: #1a202c; text-align: center;">かもくんへようこそ！</h1>
        <p style="text-align: center; color: #4a5568; font-size: 16px; margin-bottom: 40px;">
            講義のリアルなレビューを共有・確認できるプラットフォームです。
        </p>

        <div style="display: flex; gap: 20px; justify-content: center;">
            <button onclick="goToPage('view.html')" style="background: #4a00e0; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; flex: 1; max-width: 250px;">
                🔍 レビューを見る
            </button>
            <button onclick="goToPage('report.html')" style="background: #ffffff; color: #4a00e0; border: 2px solid #4a00e0; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; flex: 1; max-width: 250px;">
                ✍️ レビューを書く
            </button>
        </div>
    </div>

    <script>
        function goToPage(page) {
            // ⚡ ボタンクリック時も必ず最上階（画面全体）を遷移させる
            window.top.location.href = page;
        }
    </script>
</body>
</html>
