<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
class Database {
    constructor() {
        // Google Apps Script (GAS) のWebアプリURLをここに貼り付けます
        this.gasUrl = 'https://script.google.com/macros/s/YOUR_GAS_WEB_APP_URL/exec';
    }

    async request(action, data = {}) {
        try {
            const response = await fetch(this.gasUrl, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'text/plain', // GASのCORS制約を回避するための設定
                },
                body: JSON.stringify({ action, ...data })
            });
            return await response.json();
        } catch (error) {
            console.error("Database Error:", error);
            return { success: false, error: "通信エラーが発生しました" };
        }
    }
}
// グローバル（windowオブジェクト）に展開して他ファイルから使えるようにします
window.Database = Database;
</script>
</body>
</html>
