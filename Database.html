<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
class Database {
    constructor() {
        // ★ここにGASでデプロイした最新の「ウェブアプリのURL」を貼り付けます★
        this.gasUrl = "https://script.google.com/macros/s/AKfycbyp2xDnWOQATqSohHHU-eqJuEBSlG6tcPb_KXIXWOmXyaB5k6Oo_--nJpNJZOB0w2u0sw/exec";
    }

    async request(action, data) {
        try {
            const response = await fetch(this.gasUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain'
                },
                cache: 'no-store', // ★追加: 強力なキャッシュ無効化（常に最新を取得）
                redirect: 'follow', // GASの仕様対応
                body: JSON.stringify({ action: action, data: data })
            });
            
            const result = await response.json();
            return result;
        } catch (error) {
            console.error("Fetchエラー:", error);
            // 画面にもエラー原因が出るようにアラートを追加
            alert("通信エラーが発生しました: " + error.message);
            return { success: false, error: "サーバーとの通信に失敗しました" };
        }
    }
}
window.Database = Database;
</script>
</body>
</html>
