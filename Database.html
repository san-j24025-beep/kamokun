<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Database</title>
</head>
<body>
<script>
class Database {
    constructor() {
        // あなたの正しいGASウェブアプリURL
        this.gasUrl = 'https://script.google.com/macros/s/AKfycbyp2xDnWOQATqSohHHU-eqJuEBSlG6tcPb_KXIXWOmXyaB5k6Oo_--nJpNJZOB0w2u0sw/exec';
    }

    async request(action, data = {}) {
        try {
            const safeUrl = encodeURI(this.gasUrl);
            const response = await fetch(safeUrl, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'text/plain',
                },
                body: JSON.stringify({ action, ...data })
            });
            return await response.json();
        } catch (error) {
            console.error("Database Error:", error);
            return { success: false, error: "通信エラーが発生しました" };
        }
    }
}
window.Database = Database;
</script>
</body>
</html>
