<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
class Database {
    constructor() {
        // ご提示いただいた正しいURLをセットしています
        this.gasUrl = 'https://script.google.com/macros/s/AKfycbyp2xDnWOQATqSohHHU-eqJuEBSlG6tcPb_KXIXWOmXyaB5k6Oo_--nJpNJZOB0w2u0sw/exec';
    }

    async request(action, data = {}) {
        try {
            // URLに特殊文字が含まれる場合の不具合を防ぐため、安全な形に自動変換（エンコード）します
            const safeUrl = encodeURI(this.gasUrl);

            const response = await fetch(safeUrl, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'text/plain', // GASのCORS制約を回避するための設定
                },
                body: JSON.stringify({ action, ...data })
            });
            return await response.json();
        } catch (error) {
            console.error("Database Error:", error);
            return { success: false, error: "通信エラーが発生しました" };
        }
    }
}
// グローバル（windowオブジェクト）に展開
window.Database = Database;
</script>
</body>
</html>
